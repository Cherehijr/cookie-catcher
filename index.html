<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="google-adsense-account" content="ca-pub-8313056064206246">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cookie Catcher</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            transition: background 1.5s ease;
        }

        /* ---- THÈMES PAR NIVEAU ---- */
            .theme-1 { background: linear-gradient(180deg, #e8f5e9 0%, #c8e6c9 100%); }
            .theme-2 { background: linear-gradient(180deg, #e3f2fd 0%, #b3e5fc 100%); }
            .theme-3 { background: linear-gradient(180deg, #fff9c4 0%, #ffe082 100%); }
            .theme-4 { background: linear-gradient(180deg, #ff9800 0%, #ff5252 40%, #29b6f6 100%); }

        /* ---- DÉCORATIONS FOND ---- */
        #decoration {
            position: fixed;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .deco-item {
            position: absolute;
            font-size: 28px;
            opacity: 0.15;
            animation: flotter linear infinite;
        }

        @keyframes flotter {
            0%   { transform: translateY(0) rotate(0deg); }
            50%  { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        /* ---- HUD ---- */
        #hud {
            position: fixed;
            top: 0; width: 100%;
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            border-bottom: 4px solid #FFEB3B;
            backdrop-filter: blur(10px);
            background: rgba(76, 175, 80, 0.85);
        }

        #hud-points {
            font-size: clamp(14px, 3.5vw, 22px);
            font-weight: bold;
            color: #FFEB3B;
            text-shadow: 2px 2px 0 #388E3C;
        }

        #hud-niveau {
            font-size: clamp(12px, 3vw, 18px);
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 0 #388E3C;
        }

        #hud-vies { font-size: clamp(16px, 4vw, 24px); }

        /* ---- ZONE DE JEU ---- */
        #zone-jeu {
            width: 100vw;
            height: 100vh;
            position: relative;
            padding-top: 60px;
            z-index: 1;
        }

        .objet {
            position: absolute;
            font-size: clamp(36px, 8vw, 54px);
            cursor: pointer;
            animation: tomber linear forwards;
            z-index: 5;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
            transition: transform 0.1s;
        }

        .objet:hover { transform: scale(1.2); }

        @keyframes tomber {
            from { top: 60px; opacity: 1; }
            to   { top: 110vh; opacity: 0.5; }
        }

        /* ---- EXPLOSION ---- */
        .explosion {
            position: fixed;
            font-size: 30px;
            pointer-events: none;
            z-index: 30;
            animation: exploser 0.6s forwards;
        }

        @keyframes exploser {
            0%   { transform: scale(0.5); opacity: 1; }
            50%  { transform: scale(2); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* ---- TRANSITION NIVEAU ---- */
        #transition-niveau {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #transition-niveau.visible {
            opacity: 1;
            pointer-events: all;
        }

        #transition-niveau h2 {
            font-size: 64px;
            color: white;
            text-shadow: 3px 3px 0 #d63384, 6px 6px 0 #8b4513;
            animation: bondir 0.5s ease;
        }

        #transition-niveau p {
            font-size: 24px;
            color: white;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
            margin-top: 10px;
        }

        @keyframes bondir {
            0%   { transform: scale(0) rotate(-10deg); }
            60%  { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* ---- CONFETTIS ---- */
        .confetti {
            position: fixed;
            font-size: 22px;
            pointer-events: none;
            z-index: 49;
            animation: confettiTomber 1.5s forwards;
        }

        @keyframes confettiTomber {
            0%   { top: 40%; opacity: 1; transform: rotate(0deg) scale(1); }
            100% { top: 100%; opacity: 0; transform: rotate(720deg) scale(0.5); }
        }

        /* ---- BARRE PROGRESSION ---- */
        #barre-niveau {
            position: fixed;
            bottom: 0; width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.3);
            z-index: 10;
        }

        #progression {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #FFEB3B, #FF9800);
            width: 0%;
            transition: width 0.3s;
            border-radius: 0 5px 5px 0;
    }

        /* ---- POPUP ---- */
        .popup {
            position: fixed;
            font-size: 26px;
            font-weight: bold;
            pointer-events: none;
            animation: monter 0.8s forwards;
            z-index: 20;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        @keyframes monter {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to   { opacity: 0; transform: translateY(-80px) scale(1.3); }
        }

        /* ---- ÉCRANS ---- */
        .ecran {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 15px;
            background: linear-gradient(135deg, #e8f5e9 0%, #b3e5fc 50%, #fff9c4 100%);
        }

        .cache { display: none !important; }

        #ecran-accueil h1 {
            font-size: 56px;
            color: #FF5252;
            text-shadow: 3px 3px 0 #FFEB3B, 6px 6px 0 rgba(0,0,0,0.15);
            animation: bondir 0.8s ease;
        }

        .sous-titre {
            font-size: 16px;
            color: #d63384;
            text-align: center;
            max-width: 300px;
        }

        input {
            font-size: clamp(16px, 4vw, 20px);
            padding: 12px 20px;
            border-radius: 25px;
            border: 3px solid #4CAF50;
            background: rgba(255,255,255,0.9);
            color: #388E3C;
            text-align: center;
            width: 280px;
            outline: none;
        }

        input:focus { border-color: #FF9800; }

        button {
            font-size: clamp(16px, 4vw, 20px);
            padding: clamp(10px, 2.5vw, 12px) clamp(25px, 6vw, 35px);
            min-height: 48px;
            background: linear-gradient(135deg, #FF5252, #FF9800);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,82,82,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(214,51,132,0.5);
        }

        button:active { transform: translateY(0); }

        .btn-secondaire {
            background: rgba(255,255,255,0.7);
            color: #4CAF50;
            border: 3px solid #4CAF50;
            box-shadow: none;
        }

        #erreur-pseudo { color: #d63384; font-size: 14px; min-height: 18px; }

        /* ---- CLASSEMENT ---- */
        #ecran-classement {
            background: linear-gradient(135deg, #ffd6e7, #c8b6ff);
        }

        #ecran-classement h2 {
            font-size: 40px;
            color: #8b4513;
            text-shadow: 2px 2px 0 #ffd700;
        }

        #tableau-classement {
            width: 340px;
            max-height: 280px;
            overflow-y: auto;
            background: rgba(255,255,255,0.5);
            border-radius: 20px;
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.8);
        }

        .ligne-score {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            border-bottom: 1px solid rgba(214,51,132,0.2);
            font-size: 16px;
            color: #8b4513;
            font-weight: bold;
        }

        /* ---- GAME OVER ---- */
        #ecran-gameover {
            background: linear-gradient(135deg, #ffd6e7, #ffb3c6);
        }

        #ecran-gameover h2 {
            font-size: 52px;
            color: #8b4513;
            text-shadow: 3px 3px 0 #ffd700;
        }

        #ecran-gameover p {
            font-size: 20px;
            color: #d63384;
            font-weight: bold;
        }
    </style>
</head>
<body class="theme-1">

<!-- DÉCORATIONS FOND -->
<div id="decoration"></div>

<!-- HUD -->
<div id="hud" class="cache">
    <div id="hud-points">🍪 0 pts</div>
    <div id="hud-niveau">⚡ Niveau 1</div>
    <div id="hud-vies">❤️❤️❤️</div>
    <button onclick="togglePause()" id="btn-pause" style="background:rgba(255,255,255,0.3); color:#8b4513; border:2px solid #d63384; padding:6px 14px; font-size:16px; border-radius:20px;">⏸️</button>
</div>

<!-- Zone de jeu -->
<div id="zone-jeu"></div>

<!-- Barre de progression -->
<div id="barre-niveau" class="cache"><div id="progression"></div></div>

<!-- Transition niveau -->
<div id="transition-niveau">
    <h2 id="transition-texte">⚡ Niveau 2 !</h2>
    <p id="transition-sous">Plus vite... 🍭</p>
</div>

<!-- ===== ÉCRAN PAUSE ===== -->
<div class="ecran cache" id="ecran-pause">
    <h2 style="font-size:48px; color:#8b4513; text-shadow: 2px 2px 0 #ffd700;">⏸️ Pause</h2>
    <button onclick="togglePause()">▶️ Reprendre</button>
    <button class="btn-secondaire" onclick="pauseClassement()">🏆 Classement</button>
    <button class="btn-secondaire" onclick="quitter()">🚪 Quitter</button>
</div>

<!-- ===== ÉCRAN ACCUEIL ===== -->
<div class="ecran" id="ecran-accueil">
    <h1>🍪 Cookie Catcher</h1>
    <p class="sous-titre">Attrape les gourmandises, évite les imposteurs !<br>Un seul essai — rends-le légendaire. 🏆</p>
    <input type="text" id="input-pseudo" placeholder="🎀 Ton pseudo..." maxlength="20">
    <div id="erreur-pseudo"></div>
    <button onclick="creerProfil()">▶️ Jouer !</button>
    <button class="btn-secondaire" onclick="afficherClassement()">🏆 Classement</button>
</div>

<!-- ===== ÉCRAN CLASSEMENT ===== -->
<div class="ecran cache" id="ecran-classement">
    <h2>🏆 Classement</h2>
    <div id="tableau-classement"></div>
    <button onclick="retourAccueil()">← Retour</button>
</div>

<!-- ===== ÉCRAN GAME OVER ===== -->
<div class="ecran cache" id="ecran-gameover">
    <h2>💀 Game Over !</h2>
    <p id="go-pseudo"></p>
    <p id="go-score"></p>
    <p id="go-rang"></p>
    <button onclick="afficherClassement()">🏆 Voir le classement</button>
</div>

<script>
    // ===== SONS =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function jouerSon(frequence, type, duree, volume = 0.3) {
    const oscillateur = audioCtx.createOscillator();
    const gainNode    = audioCtx.createGain();
    oscillateur.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillateur.type      = type;
    oscillateur.frequency.setValueAtTime(frequence, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duree);
    oscillateur.start();
    oscillateur.stop(audioCtx.currentTime + duree);
}

function sonCookie() {
    jouerSon(520, "sine", 0.15, 0.4);
    setTimeout(() => jouerSon(780, "sine", 0.15, 0.3), 80);
}

function sonFaux() {
    jouerSon(200, "sawtooth", 0.3, 0.5);
    setTimeout(() => jouerSon(150, "sawtooth", 0.3, 0.4), 150);
}

function sonVie() {
    jouerSon(440, "sine", 0.1, 0.3);
    setTimeout(() => jouerSon(660, "sine", 0.1, 0.3), 100);
    setTimeout(() => jouerSon(880, "sine", 0.2, 0.4), 200);
}

function sonNiveau() {
    [523, 659, 784, 1047].forEach((f, i) => {
        setTimeout(() => jouerSon(f, "sine", 0.2, 0.4), i * 120);
    });
}

function sonGameOver() {
    [400, 350, 300, 200].forEach((f, i) => {
        setTimeout(() => jouerSon(f, "sawtooth", 0.3, 0.5), i * 150);
    });
}
    // ===== DONNÉES =====
    let pseudo       = "";
    let points       = 0;
    let vies         = 3;
    let niveau       = 1;
    let enCours      = false;
    let intervalle   = null;
    let coeursDonnes = 0;

    const vrais = ["🍪", "🍩", "🎂", "🧁", "🍰", "🍫", "🍬", "🍭"];
    const faux  = ["☠️", "💀", "🕷️", "🐛", "🤢"];
    const zone  = document.getElementById("zone-jeu");

    const themes = ["theme-1", "theme-2", "theme-3", "theme-4"];
    const decosParTheme = [
        ["🌱", "🌻", "🍀", "🌈"],
        ["🐠", "🐬", "⭐", "🌊"],
        ["🌸", "🦋", "🌺", "🎀"],
        ["🌟", "✨", "🎊", "🎉"]
    ];

    const messagesNiveau = [
        "", "",
        "Plus vite ! 🍩", "Ça chauffe ! 🔥",
        "Tu es en feu ! 🎂", "Incroyable ! 🍭",
        "Légendaire ! 🌈", "ULTIME ! ✨"
    ];

    // ===== DÉCORATIONS FOND =====
    function creerDecoration(themeIndex) {
        const deco = document.getElementById("decoration");
        deco.innerHTML = "";
        const emojis = decosParTheme[themeIndex] || decosParTheme[0];
        for (let i = 0; i < 12; i++) {
            const el = document.createElement("div");
            el.classList.add("deco-item");
            el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = Math.random() * 95 + "%";
            el.style.top  = Math.random() * 95 + "%";
            el.style.animationDuration = (3 + Math.random() * 4) + "s";
            el.style.animationDelay    = (Math.random() * 3) + "s";
            deco.appendChild(el);
        }
    }

    // ===== PROFIL =====
    function creerProfil() {
        const input  = document.getElementById("input-pseudo").value.trim();
        const erreur = document.getElementById("erreur-pseudo");
        if (input.length < 2) {
            erreur.textContent = "⚠️ Pseudo trop court (2 caractères minimum)";
            return;
        }
        pseudo = input;
        erreur.textContent = "";
        cacherEcran("ecran-accueil");
        demarrer();
    }

    // ===== DÉMARRAGE =====
    function demarrer() {
        points = 0; vies = 3; niveau = 1; coeursDonnes = 0;
        enCours = true;
        appliquerTheme(0);
        document.getElementById("hud").classList.remove("cache");
        document.getElementById("barre-niveau").classList.remove("cache");
        mettreAJour();
        lancerIntervalle();
    }

    function appliquerTheme(index) {
        document.body.className = themes[Math.min(index, themes.length - 1)];
        creerDecoration(Math.min(index, themes.length - 1));
    }

    function lancerIntervalle() {
        if (intervalle) clearInterval(intervalle);
        intervalle = setInterval(creerObjet, Math.max(400, 1600 / niveau));
    }

    // ===== CRÉATION D'OBJETS =====
    function creerObjet() {
        if (!enCours) return;

        const rand = Math.random();
        let emoji, type;

        const seuilCoeur = Math.floor(points / 150);
        if (seuilCoeur > coeursDonnes) {
            coeursDonnes++;
            emoji = "❤️"; type = "vie";
        } else if (rand < 0.25) {
            emoji = faux[Math.floor(Math.random() * faux.length)];
            type  = "faux";
        } else {
            emoji = vrais[Math.floor(Math.random() * vrais.length)];
            type  = "vrai";
        }

        const objet = document.createElement("div");
        objet.classList.add("objet");
        objet.textContent = emoji;

        const x = Math.random() * (window.innerWidth - 60);
        objet.style.left = x + "px";

        const duree = Math.max(800, (3500 - niveau * 150) + Math.random() * 800);
        objet.style.animationDuration = duree + "ms";

        objet.addEventListener("click", (e) => {
            gererClic(objet, type, e.clientX, e.clientY);
        });

        objet.addEventListener("animationend", () => {
            if (objet.parentNode) objet.remove();
        });

        zone.appendChild(objet);
    }

    // ===== GESTION DES CLICS =====
    function gererClic(objet, type, x, y) {
        objet.remove();
        if (type === "vrai") {
            gagnerPoint(x, y);
        } else if (type === "faux") {
            perdreVie(x, y);
        } else if (type === "vie") {
            recupererVie(x, y);
        }
    }

    function gagnerPoint(x, y) {
        sonCookie();
        points += 5;
        afficherExplosion(x, y, "🍪");
        afficherPopup("+" + (niveau * 5) + " 🍪", x, "#8b4513");
        mettreAJour();
        verifierNiveau();
    }

    function perdreVie(x, y) {
        sonFaux();
        vies--;
        afficherExplosion(x, y, "💥");
        afficherPopup("-1 ❤️", x, "#d63384");
        mettreAJour();
        if (vies <= 0) gameOver();
    }

    function recupererVie(x, y) {
        sonVie();
        if (vies < 3) {
            vies++;
            afficherPopup("+1 ❤️", x, "#ff6b9d");
        } else {
            points += 5;
            afficherPopup("+5 🍪 bonus !", x, "#ffd700");
        }
        afficherExplosion(x, y, "❤️");
        mettreAJour();
    }

    // ===== NIVEAU =====
    function verifierNiveau() {
        const nouveauNiveau = Math.floor(points / 200) + 1;
        const progression   = (points % 200) / 200 * 100;
        document.getElementById("progression").style.width = progression + "%";

        if (nouveauNiveau > niveau) {
            niveau = nouveauNiveau;
            afficherTransitionNiveau();
            appliquerTheme(Math.floor((niveau - 1) / 2));
            lancerIntervalle();
        }
    }

    function afficherTransitionNiveau() {
        sonNiveau();
        const msg = messagesNiveau[Math.min(niveau, messagesNiveau.length - 1)] || "Au suivant ! 🍭";
        document.getElementById("transition-texte").textContent = "⚡ Niveau " + niveau + " !";
        document.getElementById("transition-sous").textContent  = msg;

        const t = document.getElementById("transition-niveau");
        t.classList.add("visible");
        lancerConfettis();
        setTimeout(() => t.classList.remove("visible"), 1800);
    }

    function lancerConfettis() {
        const emojis = ["🍪", "🍬", "🎊", "⭐", "🍭", "✨", "🧁"];
        for (let i = 0; i < 20; i++) {
            setTimeout(() => {
                const c = document.createElement("div");
                c.classList.add("confetti");
                c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                c.style.left  = Math.random() * 100 + "%";
                c.style.animationDuration = (1 + Math.random()) + "s";
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 2000);
            }, i * 80);
        }
    }

    // ===== AFFICHAGE =====
    function mettreAJour() {
        document.getElementById("hud-points").textContent = "🍪 " + points + " pts";
        document.getElementById("hud-niveau").textContent = "⚡ Niveau " + niveau;
        document.getElementById("hud-vies").textContent   = "❤️".repeat(vies) + "🖤".repeat(3 - vies);
    }

    function afficherPopup(texte, x, couleur) {
        const popup = document.createElement("div");
        popup.classList.add("popup");
        popup.textContent  = texte;
        popup.style.color  = couleur;
        popup.style.left   = Math.min(x, window.innerWidth - 130) + "px";
        popup.style.top    = "80px";
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 800);
    }

    function afficherExplosion(x, y, emoji) {
        const e = document.createElement("div");
        e.classList.add("explosion");
        e.textContent  = emoji;
        e.style.left   = (x - 20) + "px";
        e.style.top    = (y - 20) + "px";
        document.body.appendChild(e);
        setTimeout(() => e.remove(), 600);
    }

    // ===== GAME OVER =====
   function gameOver() {
        sonGameOver();
        enCours = false;
        clearInterval(intervalle);
        document.querySelectorAll(".objet").forEach(o => o.remove());
        document.getElementById("hud").classList.add("cache");
        document.getElementById("barre-niveau").classList.add("cache");

        const scores = getScores();
        scores.push({ pseudo, points });
        scores.sort((a, b) => b.points - a.points);
        localStorage.setItem("cookieCatcher_scores", JSON.stringify(scores));

        const rang = scores.findIndex(s => s.pseudo === pseudo && s.points === points) + 1;

        document.getElementById("go-pseudo").textContent = "👤 " + pseudo;
        document.getElementById("go-score").textContent  = "🍪 Score : " + points + " pts";
        document.getElementById("go-rang").textContent   = "🏆 Rang : #" + rang;

        afficherEcran("ecran-gameover");
    }

    // ===== CLASSEMENT =====
    function getScores() {
        const data = localStorage.getItem("cookieCatcher_scores");
        return data ? JSON.parse(data) : [];
    }

    function afficherClassement() {
        cacherEcran("ecran-accueil");
        cacherEcran("ecran-gameover");

        const scores  = getScores();
        const tableau = document.getElementById("tableau-classement");
        const medailles = ["🥇", "🥈", "🥉"];

        tableau.innerHTML = scores.length === 0
            ? "<p style='text-align:center;padding:20px;color:#d63384'>Aucun score encore 🍪</p>"
            : scores.slice(0, 10).map((s, i) => `
                <div class="ligne-score">
                    <span>${medailles[i] || (i + 1) + "."} ${s.pseudo}</span>
                    <span>${s.points} pts</span>
                </div>`).join("");

        afficherEcran("ecran-classement");
    }

    function retourAccueil() {
        cacherEcran("ecran-classement");
        afficherEcran("ecran-accueil");
    }

    // ===== PAUSE =====
let enPause = false;

function togglePause() {
    enPause = !enPause;
    if (enPause) {
        clearInterval(intervalle);
        document.querySelectorAll(".objet").forEach(o => o.style.animationPlayState = "paused");
        document.getElementById("btn-pause").textContent = "▶️";
        afficherEcran("ecran-pause");
    } else {
        document.querySelectorAll(".objet").forEach(o => o.style.animationPlayState = "running");
        document.getElementById("btn-pause").textContent = "⏸️";
        cacherEcran("ecran-pause");
        lancerIntervalle();
    }
}

function pauseClassement() {
    cacherEcran("ecran-pause");
    afficherClassement();
}

function quitter() {
    enCours = false;
    enPause = false;
    clearInterval(intervalle);
    document.querySelectorAll(".objet").forEach(o => o.remove());
    document.getElementById("hud").classList.add("cache");
    document.getElementById("barre-niveau").classList.add("cache");
    cacherEcran("ecran-pause");
    afficherEcran("ecran-accueil");
}

    function afficherEcran(id) { document.getElementById(id).classList.remove("cache"); }
    function cacherEcran(id)   { document.getElementById(id).classList.add("cache"); }

    // Décorations accueil
    creerDecoration(0);
</script>
</body>
